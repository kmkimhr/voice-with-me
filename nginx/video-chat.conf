# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name kmkim.space;

    # certbot webroot 인증용
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 메인 서버
server {
    listen 443 ssl;
    server_name kmkim.space;

    ssl_certificate     /etc/letsencrypt/live/kmkim.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kmkim.space/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # React 빌드 정적 파일 서빙
    root /usr/share/nginx/html;
    index index.html;

    # HTML은 캐시 안 함 (배포 후 즉시 반영)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files $uri /index.html;
    }

    # SW 관련 파일도 캐시 안 함
    location ~* (service-worker\.js|sw\.js|workbox-.+\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # JS/CSS는 파일명에 해시 포함되므로 장기 캐시
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # SFU WebSocket 프록시 (/socket.io/ → SFU :3000)
    location /socket.io/ {
        proxy_pass http://sfu:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
