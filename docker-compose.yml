version: '3.9'

services:
  sfu:
    build: ./sfu
    restart: unless-stopped
    env_file: ./sfu/.env
    ports:
      - "3000:3000"
      - "10000-10100:10000-10100/udp"
    networks:
      - videochat

  turn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./turn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - turn-logs:/var/log/turnserver
    command: -c /etc/coturn/turnserver.conf

volumes:
  turn-logs:

networks:
  videochat:
    driver: bridge
