services:
  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/video-chat.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - videochat
    depends_on:
      - sfu

  certbot:
    build: ./certbot
    profiles: ["certbot"]
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  sfu:
    build: ./sfu
    restart: unless-stopped
    env_file: ./sfu/.env
    ports:
      - "3000:3000"
      - "10000-10100:10000-10100/udp"
    networks:
      - videochat

  turn:
    build: ./turn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./turn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - turn-logs:/var/log/turnserver
    command: -c /etc/coturn/turnserver.conf

volumes:
  turn-logs:

networks:
  videochat:
    driver: bridge
