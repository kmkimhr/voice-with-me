services:
  nginx:
    build:
      context: .
      dockerfile_inline: |
        FROM node:20-alpine AS builder
        WORKDIR /app
        COPY front/package*.json ./
        RUN npm install
        COPY front/ .
        RUN npm run build

        FROM nginx:alpine
        COPY --from=builder /app/dist /usr/share/nginx/html
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/video-chat.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - videochat
    depends_on:
      - sfu

  certbot:
    image: certbot/certbot:latest
    profiles: ["certbot"]
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  sfu:
    build: ./sfu
    restart: unless-stopped
    env_file: ./sfu/.env
    ports:
      - "3000:3000"
      - "10000-10100:10000-10100/udp"
    networks:
      - videochat

  turn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./turn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - turn-logs:/var/log/turnserver
    command: -c /etc/coturn/turnserver.conf

volumes:
  turn-logs:

networks:
  videochat:
    driver: bridge
